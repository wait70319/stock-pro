<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股市看板 (閃電抓取版)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", "Segoe UI", Roboto, sans-serif;
            background-color: #0f0f11; color: #e0e0e0; margin: 0; padding: 20px 10px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 900px; }
        .header-section {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px;
        }
        h2 { color: #fff; margin: 0; font-size: 20px; font-weight: 500; }
        .btn-update {
            background-color: #1a73e8; color: white; border: none;
            padding: 8px 16px; border-radius: 6px; cursor: pointer;
            font-size: 14px; font-weight: bold; transition: 0.2s;
        }
        .btn-update:hover { background-color: #1557b0; }
        .btn-update:disabled { background-color: #555; color: #888; cursor: not-allowed; }

        .card {
            background-color: #1c1c1e; border-radius: 10px; border: 1px solid #2c2c2e;
            margin-bottom: 20px; overflow: hidden; display: flex; flex-direction: column;
        }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; padding: 15px 20px; }
        .stock-info { display: flex; flex-direction: column; gap: 4px; }
        .stock-name { font-size: 18px; font-weight: bold; color: #fff; }
        .stock-symbol { font-size: 12px; color: #8e8e93; display: flex; align-items: center; gap: 5px;}
        .stock-symbol input {
            background: #2c2c2e; border: 1px solid #444; color: #8e8e93; 
            font-size: 11px; padding: 2px 5px; border-radius: 4px; width: 80px;
        }
        
        .price-info { text-align: right; }
        .current-price { font-size: 24px; font-weight: bold; transition: color 0.3s; }
        .price-change { font-size: 14px; margin-top: 2px; }
        .vol-info { font-size: 11px; color: #8e8e93; margin-top: 4px; }
        
        .error-text { color: #f39c12 !important; font-size: 16px !important; }
        .loading-text { color: #8e8e93 !important; font-size: 14px !important; }

        .chart-container { width: 100%; height: 120px; position: relative; padding: 0 10px; box-sizing: border-box; }

        .calc-inputs {
            display: flex; flex-wrap: wrap; gap: 15px; padding: 15px 20px;
            background-color: #151516; border-top: 1px solid #2c2c2e; border-bottom: 1px solid #2c2c2e;
        }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 12px; color: #8e8e93; }
        .input-group input {
            background-color: #2c2c2e; border: 1px solid #444; color: #fff;
            padding: 6px 10px; border-radius: 6px; font-size: 14px; width: 90px; text-align: center;
        }
        .input-group input:focus { outline: none; border-color: #1a73e8; }
        
        .result-group { display: flex; flex-direction: column; gap: 5px; margin-left: auto; text-align: right; }
        .result-group label { font-size: 12px; color: #8e8e93; }
        .result-val { font-size: 18px; font-weight: bold; }

        .grid-section { padding: 15px 20px; }
        .grid-title { font-size: 13px; color: #8e8e93; margin-bottom: 10px; font-weight: bold; }
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 8px; }
        .grid-item { background-color: #2c2c2e; border-radius: 6px; padding: 8px 5px; text-align: center; }
        .item-label { font-size: 11px; color: #8e8e93; margin-bottom: 4px; }
        .item-value { font-size: 13px; font-weight: bold; color: #fff; }

        .up { color: #ff4a4a !important; }
        .down { color: #00e676 !important; }
        .drop-val { color: #64b5f6; }
        .fib-val { color: #ffb74d; }
        .note { font-size: 12px; color: #8e8e93; line-height: 1.5; margin-top: 10px; }
        .proxy-status { font-size: 11px; color: #555; margin-top: 4px; }
        
        @media (max-width: 600px) {
            .data-grid { grid-template-columns: repeat(3, 1fr); }
            .calc-inputs { gap: 10px; }
            .input-group input { width: 75px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <h2>📈 股市看板 (閃電抓取版)</h2>
            <button id="updateBtn" class="btn-update" onclick="fetchPrices()">一鍵同步最新報價</button>
        </div>
        
        <div id="cards-container"></div>

        <div class="note">
            💡 提示：已升級多重備用代理伺服器，自動嘗試最佳連線路徑，大幅提升穩定性。
        </div>
        <div class="proxy-status" id="proxyStatus"></div>
    </div>

    <script>
        const defaultStocks = [
            { code: '台灣加權', yahoo: '^TWII', highest: 35414.54, low: '', current: 35414.54 },
            { code: '00982A', yahoo: '00982A.TW', highest: 16.76, low: '', current: '' },
            { code: '009805', yahoo: '009805.TW', highest: 15.19, low: '', current: '' },
            { code: '00949', yahoo: '00949.TW', highest: 20.88, low: '', current: '' }
        ];

        // 多重備用 Proxy 清單，按優先順序嘗試
        const PROXY_LIST = [
            {
                name: 'corsproxy.io',
                buildUrl: (apiUrl) => `https://corsproxy.io/?${encodeURIComponent(apiUrl)}`
            },
            {
                name: 'allorigins (get)',
                buildUrl: (apiUrl) => `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`,
                parseResponse: async (res) => {
                    const wrapper = await res.json();
                    return JSON.parse(wrapper.contents);
                }
            },
            {
                name: 'allorigins (raw)',
                buildUrl: (apiUrl) => `https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`
            },
            {
                name: 'thingproxy',
                buildUrl: (apiUrl) => `https://thingproxy.freeboard.io/fetch/${apiUrl}`
            }
        ];

        let workingProxyIndex = 0; // 記住上次成功的 proxy

        let stocks = [];
        try {
            stocks = JSON.parse(localStorage.getItem('stockTrackerDataV3')) || defaultStocks;
        } catch(e) {
            stocks = defaultStocks;
        }
        
        stocks = stocks.map((s, i) => {
            const def = defaultStocks[i] || {};
            let y = s.yahoo || def.yahoo || '';
            if (s.code === '00982A' && y === '00982A.TWO') y = '00982A.TW';
            return { ...def, ...s, yahoo: y };
        });

        const container = document.getElementById('cards-container');
        let chartInstances = {};

        function renderCards() {
            container.innerHTML = '';
            stocks.forEach((stock, index) => {
                const cardHTML = `
                <div class="card">
                    <div class="card-top">
                        <div class="stock-info">
                            <span class="stock-name">${stock.code}</span>
                            <span class="stock-symbol">
                                Yahoo代號: <input type="text" id="yahoo-${index}" value="${stock.yahoo}" onchange="updateData(${index}, true)">
                            </span>
                        </div>
                        <div class="price-info">
                            <div class="current-price loading-text" id="display-price-${index}">讀取中...</div>
                            <div class="price-change" id="display-change-${index}">-</div>
                            <div class="vol-info">成交量: <span id="vol-${index}">-</span></div>
                        </div>
                    </div>

                    <div class="chart-container"><canvas id="chart-${index}"></canvas></div>

                    <div class="calc-inputs">
                        <div class="input-group">
                            <label>目前價格(可手填)</label>
                            <input type="number" id="current-${index}" step="0.01" value="${stock.current}" oninput="updateData(${index})">
                        </div>
                        <div class="input-group">
                            <label>波段高點</label>
                            <input type="number" id="high-${index}" step="0.01" value="${stock.highest}" oninput="updateData(${index})">
                        </div>
                        <div class="input-group">
                            <label>波段低點</label>
                            <input type="number" id="low-${index}" step="0.01" value="${stock.low}" oninput="updateData(${index})" placeholder="選填">
                        </div>
                        <div class="result-group">
                            <label>距高點差價 / 漲跌幅</label>
                            <div class="result-val" id="diff-info-${index}">-</div>
                        </div>
                    </div>

                    <div class="grid-section">
                        <div class="grid-title">回檔目標價</div>
                        <div class="data-grid">
                            <div class="grid-item"><div class="item-label">-5%</div><div class="item-value drop-val" id="drop-5-${index}">-</div></div>
                            <div class="grid-item"><div class="item-label">-10%</div><div class="item-value drop-val" id="drop-10-${index}">-</div></div>
                            <div class="grid-item"><div class="item-label">-15%</div><div class="item-value drop-val" id="drop-15-${index}">-</div></div>
                            <div class="grid-item"><div class="item-label">-20%</div><div class="item-value drop-val" id="drop-20-${index}">-</div></div>
                            <div class="grid-item"><div class="item-label">-25%</div><div class="item-value drop-val" id="drop-25-${index}">-</div></div>
                            <div class="grid-item"><div class="item-label">-30%</div><div class="item-value drop-val" id="drop-30-${index}">-</div></div>
                        </div>
                    </div>
                    <div class="grid-section" style="padding-top: 0;">
                        <div class="grid-title">斐波那契支撐位</div>
                        <div class="data-grid">
                            <div class="grid-item"><div class="item-label">0.236</div><div class="item-value fib-val" id="fib-236-${index}">-</div></div>
                            <div class="grid-item"><div class="item-label">0.382</div><div class="item-value fib-val" id="fib-382-${index}">-</div></div>
                            <div class="grid-item"><div class="item-label">0.500</div><div class="item-value fib-val" id="fib-500-${index}">-</div></div>
                            <div class="grid-item"><div class="item-label">0.618</div><div class="item-value fib-val" id="fib-618-${index}">-</div></div>
                        </div>
                    </div>
                </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
                calculateAll(index);
            });

            setTimeout(fetchPrices, 100);
        }

        function updateData(index, refetch = false) {
            stocks[index].yahoo = document.getElementById(`yahoo-${index}`).value.trim();
            stocks[index].highest = document.getElementById(`high-${index}`).value;
            stocks[index].low = document.getElementById(`low-${index}`).value;
            stocks[index].current = document.getElementById(`current-${index}`).value;
            localStorage.setItem('stockTrackerDataV3', JSON.stringify(stocks));
            calculateAll(index);
            if(refetch) fetchPrices();
        }

        function calculateAll(index) {
            const high = parseFloat(stocks[index].highest) || 0;
            const low = parseFloat(stocks[index].low) || 0;
            const current = parseFloat(stocks[index].current);
            
            const diffCell = document.getElementById(`diff-info-${index}`);
            const displayPrice = document.getElementById(`display-price-${index}`);
            
            if (!displayPrice.classList.contains('error-text')) {
                 displayPrice.textContent = isNaN(current) ? '-' : current.toFixed(2);
            }
            
            if (isNaN(current) || high === 0) {
                diffCell.textContent = '-'; diffCell.className = 'result-val';
            } else {
                const diff = current - high;
                const percent = (diff / high) * 100;
                const sign = diff > 0 ? '+' : '';
                diffCell.innerHTML = `${sign}${diff.toFixed(2)} &nbsp; (${sign}${percent.toFixed(2)}%)`;
                diffCell.className = `result-val ${diff > 0 ? 'up' : (diff < 0 ? 'down' : '')}`;
            }

            if (high > 0) {
                document.getElementById(`drop-5-${index}`).textContent = (high * 0.95).toFixed(2);
                document.getElementById(`drop-10-${index}`).textContent = (high * 0.90).toFixed(2);
                document.getElementById(`drop-15-${index}`).textContent = (high * 0.85).toFixed(2);
                document.getElementById(`drop-20-${index}`).textContent = (high * 0.80).toFixed(2);
                document.getElementById(`drop-25-${index}`).textContent = (high * 0.75).toFixed(2);
                document.getElementById(`drop-30-${index}`).textContent = (high * 0.70).toFixed(2);

                const range = high - low;
                document.getElementById(`fib-236-${index}`).textContent = (high - range * 0.236).toFixed(2);
                document.getElementById(`fib-382-${index}`).textContent = (high - range * 0.382).toFixed(2);
                document.getElementById(`fib-500-${index}`).textContent = (high - range * 0.500).toFixed(2);
                document.getElementById(`fib-618-${index}`).textContent = (high - range * 0.618).toFixed(2);
            }
        }

        function drawChart(index, timestamps, prices, prevClose) {
            const ctx = document.getElementById(`chart-${index}`).getContext('2d');
            if (!timestamps || timestamps.length === 0) return;

            const labels = timestamps.map(t => {
                const d = new Date(t * 1000);
                return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
            });

            const currentPrice = prices[prices.length - 1];
            const isUp = currentPrice >= prevClose;
            const mainColor = isUp ? '#ff4a4a' : '#00e676';
            
            const gradient = ctx.createLinearGradient(0, 0, 0, 120);
            gradient.addColorStop(0, isUp ? 'rgba(255, 74, 74, 0.2)' : 'rgba(0, 230, 118, 0.2)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

            if (chartInstances[index]) chartInstances[index].destroy();

            chartInstances[index] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: prices, borderColor: mainColor, backgroundColor: gradient,
                        borderWidth: 2, pointRadius: 0, pointHoverRadius: 4, fill: true, tension: 0.1
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
                    scales: {
                        x: { display: false }, 
                        y: { display: false, min: Math.min(...prices) * 0.999, max: Math.max(...prices) * 1.001 } 
                    },
                    layout: { padding: 0 }
                }
            });

            const changeElement = document.getElementById(`display-change-${index}`);
            const priceElement = document.getElementById(`display-price-${index}`);
            priceElement.classList.remove('error-text');
            priceElement.classList.remove('loading-text');

            const diff = currentPrice - prevClose;
            const percent = (diff / prevClose) * 100;
            let arrow = diff > 0 ? '▲ ' : (diff < 0 ? '▼ ' : '');
            
            changeElement.textContent = `${arrow}${Math.abs(diff).toFixed(2)} (${percent > 0 ? '+' : ''}${percent.toFixed(2)}%)`;
            changeElement.className = `price-change ${diff > 0 ? 'up' : (diff < 0 ? 'down' : '')}`;
            priceElement.className = `current-price ${diff > 0 ? 'up' : (diff < 0 ? 'down' : '')}`;
        }

        // 核心：使用多重 Proxy 備援機制，自動重試下一個
        async function fetchWithFallback(symbol) {
            const apiUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=5m&range=5d`;
            
            // 從上次成功的 proxy 開始嘗試
            for (let attempt = 0; attempt < PROXY_LIST.length; attempt++) {
                const idx = (workingProxyIndex + attempt) % PROXY_LIST.length;
                const proxy = PROXY_LIST[idx];
                
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000);
                    
                    const proxyUrl = proxy.buildUrl(apiUrl);
                    const response = await fetch(proxyUrl, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    if (!response.ok) continue;
                    
                    let data;
                    if (proxy.parseResponse) {
                        data = await proxy.parseResponse(response);
                    } else {
                        data = await response.json();
                    }
                    
                    // 驗證資料格式正確
                    if (!data?.chart?.result?.[0]) continue;
                    
                    // 成功！記住這個 proxy 以便下次優先使用
                    workingProxyIndex = idx;
                    document.getElementById('proxyStatus').textContent = `✅ 使用代理: ${proxy.name}`;
                    return data;
                    
                } catch (err) {
                    console.warn(`Proxy ${proxy.name} 失敗 (${symbol}):`, err.message);
                    continue; // 嘗試下一個
                }
            }
            
            throw new Error('所有代理伺服器均無法連線');
        }

        async function fetchPrices() {
            const btn = document.getElementById('updateBtn');
            btn.disabled = true; btn.textContent = '同步中...';

            const fetchPromises = stocks.map(async (stock, i) => {
                const symbol = stock.yahoo;
                const priceElement = document.getElementById(`display-price-${i}`);
                
                if (!symbol) {
                    priceElement.textContent = "未填代號";
                    priceElement.className = 'current-price error-text';
                    return;
                }

                priceElement.textContent = "讀取中...";
                priceElement.className = 'current-price loading-text';

                try {
                    const data = await fetchWithFallback(symbol);
                    
                    if (data.chart?.error) {
                        priceElement.textContent = "代號錯誤";
                        priceElement.className = 'current-price error-text';
                        return;
                    }

                    const result = data.chart.result[0];
                    const meta = result.meta;
                    
                    const price = meta.regularMarketPrice;
                    if (price) {
                        priceElement.classList.remove('error-text');
                        priceElement.classList.remove('loading-text');
                        stocks[i].current = price;
                        document.getElementById(`current-${i}`).value = price;
                        calculateAll(i);
                    }

                    const volume = meta.regularMarketVolume;
                    if (volume !== undefined) {
                        document.getElementById(`vol-${i}`).textContent = volume.toLocaleString();
                    }

                    const allTimestamps = result.timestamp || [];
                    const quote = result.indicators?.quote?.[0] || {};
                    const allPrices = quote.close || [];
                    
                    if (allTimestamps.length > 0 && allPrices.length > 0) {
                        const lastTimestamp = allTimestamps[allTimestamps.length - 1] * 1000;
                        const lastDateString = new Date(lastTimestamp).toDateString();
                        
                        const dailyTimestamps = [];
                        const dailyPrices = [];
                        
                        for (let j = 0; j < allTimestamps.length; j++) {
                            if (allPrices[j] !== null && new Date(allTimestamps[j] * 1000).toDateString() === lastDateString) {
                                dailyTimestamps.push(allTimestamps[j]);
                                dailyPrices.push(allPrices[j]);
                            }
                        }
                        drawChart(i, dailyTimestamps, dailyPrices, meta.previousClose);
                    }
                    
                } catch (error) { 
                    console.error('所有 Proxy 抓取失敗:', symbol, error);
                    priceElement.textContent = "連線失敗，請稍後再試";
                    priceElement.className = 'current-price error-text';
                }
            });

            await Promise.all(fetchPromises);

            localStorage.setItem('stockTrackerDataV3', JSON.stringify(stocks));
            btn.textContent = '✅ 同步完成';
            setTimeout(() => { btn.disabled = false; btn.textContent = '一鍵同步最新報價'; }, 2000);
        }

        renderCards();
    </script>
</body>
</html>
